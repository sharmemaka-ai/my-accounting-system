<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی دارایی v12.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; transition: all 0.3s; }
        .dark { background-color: #0f172a; color: #f8fafc; }
        .dark .bg-white { background-color: #1e293b; border-color: #334155; color: #f8fafc; }
        .dark .bg-slate-50 { background-color: #0f172a; }
        .dark input, .dark select, .dark textarea { background-color: #1e293b; color: white; border: 1px solid #334155 !important; }
        .card-grad { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-wrap justify-between items-center gap-4 mb-10 no-print">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 card-grad rounded-2xl flex items-center justify-center text-white shadow-xl rotate-3">
                    <i class="fas fa-vault text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">دارایی من <span class="text-indigo-600">v12.1</span></h1>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">ئۆفلاین • تێبینی زیادکرا</p>
                    </div>
                </div>
            </div>

            <nav class="flex items-center gap-2 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="px-6 py-2.5 rounded-xl text-xs font-black transition-all bg-indigo-600 text-white shadow-lg">سەرەکی</button>
                <button onclick="switchTab('list')" id="nav-list" class="px-6 py-2.5 rounded-xl text-xs font-black text-slate-400">مامەڵەکان</button>
                <button onclick="switchTab('customers')" id="nav-customers" class="px-6 py-2.5 rounded-xl text-xs font-black text-slate-400">کڕیارەکان</button>
                <div class="w-[1px] h-6 bg-slate-100 mx-2"></div>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-400 hover:bg-slate-50 transition-colors"><i class="fas fa-moon"></i></button>
                <button onclick="exportJSON()" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-400 hover:bg-slate-50" title="Backup Data"><i class="fas fa-download"></i></button>
            </nav>
        </header>

        <!-- Stats Grid -->
        <div id="view-dashboard" class="space-y-8 no-print">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="md:col-span-2 card-grad p-10 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-xs font-bold opacity-70 mb-1">کاش لەبەردەست (کۆی گشتی)</p>
                        <h2 id="sum-safe" class="text-5xl font-black tracking-tighter">0 $</h2>
                        <div class="mt-6 flex gap-4">
                            <div class="bg-white/20 px-4 py-2 rounded-xl backdrop-blur-md">
                                <p class="text-[9px] font-bold opacity-80">داهاتی ئەمڕۆ</p>
                                <p id="today-in" class="text-sm font-black">+0 $</p>
                            </div>
                            <div class="bg-black/20 px-4 py-2 rounded-xl backdrop-blur-md">
                                <p class="text-[9px] font-bold opacity-80">خەرجی ئەمڕۆ</p>
                                <p id="today-out" class="text-sm font-black">-0 $</p>
                            </div>
                        </div>
                    </div>
                    <i class="fas fa-coins absolute -right-8 -bottom-8 text-white/10 text-[12rem] -rotate-12"></i>
                </div>
                <div class="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm flex flex-col justify-center">
                    <p class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">کۆی قەرزەکان</p>
                    <h2 id="sum-debt" class="text-3xl font-black text-amber-500">0 $</h2>
                    <p class="text-[10px] text-slate-300 mt-2 font-bold">بڕی پارەی لای کڕیار</p>
                </div>
                <div class="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm flex flex-col justify-center">
                    <p class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">خەرجی مانگانە</p>
                    <h2 id="sum-month-out" class="text-3xl font-black text-rose-500">0 $</h2>
                    <p class="text-[10px] text-slate-300 mt-2 font-bold">کۆی خەرجی ئەم مانگە</p>
                </div>
            </div>

            <!-- Quick Form -->
            <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm">
                <div class="flex flex-wrap justify-between items-center mb-8 gap-4">
                    <h3 class="text-lg font-black text-slate-800">تۆمارکردنی خێرا</h3>
                    <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                        <button onclick="setTxType('in')" id="type-in" class="px-8 py-2.5 rounded-xl text-xs font-black bg-white text-indigo-600 shadow-sm transition-all">داهات (In)</button>
                        <button onclick="setTxType('out')" id="type-out" class="px-8 py-2.5 rounded-xl text-xs font-black text-slate-400 transition-all">خەرجی (Out)</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-slate-400 mr-2 uppercase">ناو یان کڕیار</label>
                        <input type="text" id="txName" placeholder="ناوی کەسەکە..." class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-slate-400 mr-2 uppercase">کۆی بڕ (Total)</label>
                        <input type="number" id="txTotal" placeholder="0.00" class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-slate-400 mr-2 uppercase">دراو (Cash)</label>
                        <input type="number" id="txCash" placeholder="0.00" class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-slate-400 mr-2 uppercase">مەبەستی مامەڵە</label>
                        <div class="flex gap-2">
                            <select id="txReason" class="flex-1 p-4 bg-slate-50 rounded-2xl border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer"></select>
                        </div>
                    </div>
                    <div class="space-y-2 md:col-span-2">
                        <label class="text-[11px] font-black text-slate-400 mr-2 uppercase">تێبینی (Note)</label>
                        <input type="text" id="txNote" placeholder="زانیاری زیاتر لێرە بنووسە..." class="w-full p-4 bg-slate-50 rounded-2xl border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="flex items-end md:col-span-3">
                        <button onclick="handleFormSubmit()" class="w-full h-[56px] card-grad text-white rounded-2xl font-black shadow-xl hover:scale-[1.01] active:scale-[0.99] transition-all">تۆمارکردن <i class="fas fa-check-circle mr-2"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- History View -->
        <div id="view-list" class="hidden space-y-6 no-print">
            <div class="bg-white p-6 rounded-[2rem] flex flex-wrap gap-4 items-center justify-between shadow-sm">
                <div class="flex-1 min-w-[250px] relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" oninput="handleSearch(this.value)" placeholder="بگەڕێ لەناو مامەڵەکان..." class="w-full p-3 pl-10 bg-slate-50 rounded-xl border-none text-xs font-bold outline-none">
                </div>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-xl text-xs font-black flex items-center gap-2 transition-all">
                        <i class="fas fa-file-excel"></i> Excel
                    </button>
                </div>
            </div>
            <div id="history-list" class="grid gap-3"></div>
        </div>

        <!-- Customers View -->
        <div id="view-customers" class="hidden no-print grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>

    <!-- Modals -->
    <div id="receiptModal" class="modal no-print" onclick="closeReceipt()">
        <div class="bg-white w-[380px] rounded-[3rem] p-10 shadow-2xl animate-pop text-slate-800" onclick="event.stopPropagation()">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-receipt text-2xl"></i>
                </div>
                <h2 class="font-black text-2xl">وەسڵی دارایی</h2>
                <p id="r-date" class="text-[10px] text-slate-400 font-bold uppercase mt-1"></p>
            </div>
            <div class="space-y-4 border-y border-dashed py-8 mb-4">
                <div class="flex justify-between items-center"><span class="text-xs font-bold text-slate-400">بۆ بەڕێز:</span> <span id="r-name" class="font-black text-sm"></span></div>
                <div class="flex justify-between items-center"><span class="text-xs font-bold text-slate-400">مەبەست:</span> <span id="r-reason" class="font-bold text-sm"></span></div>
                <div class="flex justify-between items-center"><span class="text-xs font-bold text-slate-400">کۆی گشتی:</span> <span id="r-total" class="font-black text-lg"></span></div>
                <div class="flex justify-between items-center"><span class="text-xs font-bold text-emerald-500">پارەی دراو:</span> <span id="r-cash" class="font-black text-emerald-600"></span></div>
                <div class="flex justify-between items-center"><span class="text-xs font-bold text-rose-500">بڕی قەرز:</span> <span id="r-debt" class="font-black text-rose-600"></span></div>
            </div>
            <div id="r-note-container" class="bg-slate-50 p-4 rounded-2xl mb-8 hidden">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">تێبینی:</p>
                <p id="r-note" class="text-xs font-bold text-slate-600 leading-relaxed"></p>
            </div>
            <div class="space-y-2">
                <button onclick="window.print()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-xs font-black shadow-lg">پرێنت کردن</button>
                <button onclick="closeReceipt()" class="w-full py-4 bg-slate-50 text-slate-400 rounded-2xl text-xs font-black">پاشەکشە</button>
            </div>
        </div>
    </div>

    <script>
        // Data State
        let appData = {
            transactions: JSON.parse(localStorage.getItem('my_finance_v12_txs')) || [],
            reasons: JSON.parse(localStorage.getItem('my_finance_v12_reasons')) || ["فرۆشتنی کەلوپەل", "کڕینی کاڵا", "کرێی گواستنەوە", "خەرجی رۆژانە"],
            currentType: 'in',
            searchTerm: ''
        };

        function updateStorage() {
            localStorage.setItem('my_finance_v12_txs', JSON.stringify(appData.transactions));
            localStorage.setItem('my_finance_v12_reasons', JSON.stringify(appData.reasons));
            renderAll();
        }

        // Logic
        function setTxType(type) {
            appData.currentType = type;
            document.getElementById('type-in').className = type === 'in' ? "px-8 py-2.5 rounded-xl text-xs font-black bg-white text-indigo-600 shadow-sm" : "px-8 py-2.5 rounded-xl text-xs font-black text-slate-400";
            document.getElementById('type-out').className = type === 'out' ? "px-8 py-2.5 rounded-xl text-xs font-black bg-white text-rose-600 shadow-sm" : "px-8 py-2.5 rounded-xl text-xs font-black text-slate-400";
        }

        function handleFormSubmit() {
            const name = document.getElementById('txName').value.trim();
            const total = parseFloat(document.getElementById('txTotal').value) || 0;
            const cash = parseFloat(document.getElementById('txCash').value) || 0;
            const reason = document.getElementById('txReason').value;
            const note = document.getElementById('txNote').value.trim();

            if(!name || total <= 0) return alert('تکایە ناو و بڕی پارە بە دروستی بنووسە');

            const newTx = {
                id: Date.now(),
                name, total, cash,
                debt: Math.max(0, total - cash),
                reason, note, type: appData.currentType,
                date: new Date().toISOString()
            };

            appData.transactions.push(newTx);
            updateStorage();
            
            // Clear inputs
            ['txName', 'txTotal', 'txCash', 'txNote'].forEach(id => document.getElementById(id).value = '');
        }

        function renderAll() {
            let safe = 0, debt = 0, monthOut = 0, todayIn = 0, todayOut = 0;
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            appData.transactions.forEach(t => {
                const tDate = new Date(t.date);
                const isToday = t.date.split('T')[0] === todayStr;
                const isThisMonth = tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();

                if(t.type === 'in') {
                    safe += t.cash;
                    debt += t.debt;
                    if(isToday) todayIn += t.cash;
                } else {
                    safe -= t.cash;
                    if(isThisMonth) monthOut += t.cash;
                    if(isToday) todayOut += t.cash;
                }
            });

            document.getElementById('sum-safe').innerText = safe.toLocaleString() + ' $';
            document.getElementById('sum-debt').innerText = debt.toLocaleString() + ' $';
            document.getElementById('sum-month-out').innerText = monthOut.toLocaleString() + ' $';
            document.getElementById('today-in').innerText = '+' + todayIn.toLocaleString() + ' $';
            document.getElementById('today-out').innerText = '-' + todayOut.toLocaleString() + ' $';

            document.getElementById('txReason').innerHTML = appData.reasons.map(r => `<option value="${r}">${r}</option>`).join('');

            renderHistory();
            renderCustomers();
        }

        function renderHistory() {
            const filtered = appData.transactions.filter(t => 
                t.name.toLowerCase().includes(appData.searchTerm.toLowerCase()) ||
                t.reason.toLowerCase().includes(appData.searchTerm.toLowerCase()) ||
                (t.note && t.note.toLowerCase().includes(appData.searchTerm.toLowerCase()))
            );

            document.getElementById('history-list').innerHTML = filtered.slice().reverse().map(t => `
                <div class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border border-slate-50">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${t.type === 'in' ? 'bg-indigo-50 text-indigo-600' : 'bg-rose-50 text-rose-600'}">
                            <i class="fas ${t.type === 'in' ? 'fa-arrow-down' : 'fa-arrow-up'} text-sm"></i>
                        </div>
                        <div>
                            <p class="font-black text-slate-800 text-sm">${t.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${t.reason} • ${new Date(t.date).toLocaleDateString('ku-IQ')}</p>
                            ${t.note ? `<p class="text-[10px] text-indigo-400 font-bold mt-1 italic"><i class="fas fa-pen-nib mr-1"></i> ${t.note}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-right">
                            <p class="font-black ${t.type === 'in' ? 'text-indigo-600' : 'text-rose-600'} text-lg">${t.cash.toLocaleString()} $</p>
                            ${t.debt > 0 ? `<p class="text-[9px] text-amber-500 font-black">قەرز: ${t.debt}$</p>` : ''}
                        </div>
                        <button onclick="showReceipt(${t.id})" class="text-slate-300 hover:text-indigo-600 transition-colors"><i class="fas fa-file-invoice-dollar text-xl"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderCustomers() {
            const custs = {};
            appData.transactions.forEach(t => {
                if(!custs[t.name]) custs[t.name] = { debt: 0, last: t.date };
                if(t.type === 'in') custs[t.name].debt += t.debt;
                custs[t.name].last = t.date;
            });

            document.getElementById('view-customers').innerHTML = Object.entries(custs).map(([name, d]) => `
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm text-center border border-slate-50">
                    <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                        <i class="fas fa-user text-2xl"></i>
                    </div>
                    <h3 class="font-black text-slate-800">${name}</h3>
                    <p class="text-[10px] text-slate-400 font-bold mb-6">دوایین مامەڵە: ${new Date(d.last).toLocaleDateString()}</p>
                    <div class="bg-amber-50 p-4 rounded-2xl mb-4">
                        <p class="text-[9px] text-amber-600 font-black uppercase">قەرزی ماوە</p>
                        <p class="text-2xl font-black text-amber-600">${d.debt.toLocaleString()} $</p>
                    </div>
                    <button onclick="payDebt('${name}')" class="w-full py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black hover:bg-indigo-600 transition-all">وەسڵکردنی قەرز</button>
                </div>
            `).join('');
        }

        function payDebt(name) {
            const amount = parseFloat(prompt(`${name} چەند قەرز دەداتەوە؟`));
            if(!amount || amount <= 0) return;

            const payment = {
                id: Date.now(),
                name, total: amount, cash: amount, debt: 0,
                reason: "وەسڵکردنی قەرز", note: "دراوەکە لە قەرز کەم کراوەتەوە", type: 'in',
                date: new Date().toISOString()
            };

            let remaining = amount;
            appData.transactions.forEach(t => {
                if(t.name === name && t.type === 'in' && t.debt > 0 && remaining > 0) {
                    const p = Math.min(t.debt, remaining);
                    t.debt -= p;
                    remaining -= p;
                }
            });

            appData.transactions.push(payment);
            updateStorage();
        }

        function switchTab(tab) {
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg');
                b.classList.add('text-slate-400');
            });
            document.getElementById('nav-' + tab).classList.add('bg-indigo-600', 'text-white', 'shadow-lg');
            document.getElementById('nav-' + tab).classList.remove('text-slate-400');
        }

        function handleSearch(v) { appData.searchTerm = v; renderHistory(); }
        
        function showReceipt(id) {
            const t = appData.transactions.find(x => x.id === id);
            document.getElementById('r-name').innerText = t.name;
            document.getElementById('r-reason').innerText = t.reason;
            document.getElementById('r-total').innerText = t.total.toLocaleString() + ' $';
            document.getElementById('r-cash').innerText = t.cash.toLocaleString() + ' $';
            document.getElementById('r-debt').innerText = t.debt.toLocaleString() + ' $';
            document.getElementById('r-date').innerText = new Date(t.date).toLocaleString();
            
            const noteCont = document.getElementById('r-note-container');
            if(t.note) {
                document.getElementById('r-note').innerText = t.note;
                noteCont.classList.remove('hidden');
            } else {
                noteCont.classList.add('hidden');
            }
            
            document.getElementById('receiptModal').style.display = 'flex';
        }

        function closeReceipt() { document.getElementById('receiptModal').style.display = 'none'; }
        
        function exportJSON() {
            const blob = new Blob([JSON.stringify(appData)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_finance_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function toggleDarkMode() { document.body.classList.toggle('dark'); }

        // Init
        renderAll();
    </script>
</body>
</html>
