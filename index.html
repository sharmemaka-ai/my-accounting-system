<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی ژمێریاری v11.0 - ئۆفلاین</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; transition: all 0.3s; }
        .dark { background-color: #0f172a; color: #f8fafc; }
        .dark .bg-white { background-color: #1e293b; border-color: #334155; color: #f8fafc; }
        .dark .bg-slate-50 { background-color: #0f172a; }
        .dark input, .dark select { background-color: #0f172a; color: white; border: 1px solid #334155 !important; }
        .card-grad { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .animate-pop { animation: pop 0.25s ease-out; }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8" id="main-body">

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal no-print" onclick="closeReceipt()">
        <div class="bg-white w-[350px] rounded-[2rem] p-8 shadow-2xl animate-pop" onclick="event.stopPropagation()">
            <div class="text-center border-b border-dashed pb-6 mb-6">
                <h2 class="font-black text-xl">وەسڵی فەرمی</h2>
                <p id="r-date" class="text-[10px] text-slate-400 font-bold mt-1"></p>
            </div>
            <div class="space-y-4 mb-8">
                <div class="flex justify-between text-sm"><span class="text-slate-400">کڕیار:</span> <span id="r-name" class="font-black"></span></div>
                <div class="flex justify-between text-sm"><span class="text-slate-400">بابەت:</span> <span id="r-reason" class="font-bold"></span></div>
                <div class="flex justify-between text-sm"><span class="text-slate-400">کۆی گشتی:</span> <span id="r-total" class="font-black"></span></div>
                <div class="flex justify-between text-sm"><span class="text-emerald-500 font-bold">دراو:</span> <span id="r-cash" class="font-black text-emerald-600"></span></div>
                <div class="flex justify-between text-sm"><span class="text-rose-500 font-bold">قەرز:</span> <span id="r-debt" class="font-black text-rose-600"></span></div>
            </div>
            <button onclick="window.print()" class="w-full py-3 bg-slate-900 text-white rounded-xl text-xs font-black mb-2">پرێنت</button>
            <button onclick="closeReceipt()" class="w-full py-3 bg-slate-100 text-slate-500 rounded-xl text-xs font-black">داخستن</button>
        </div>
    </div>

    <!-- Reason Modal -->
    <div id="reasonModal" class="modal no-print" onclick="closeReasonModal()">
        <div class="bg-white w-[400px] rounded-[2.5rem] p-8 shadow-2xl animate-pop" onclick="event.stopPropagation()">
            <h2 class="font-black text-lg mb-4">بەڕێوەبردنی مەبەستەکان</h2>
            <div class="space-y-2 mb-4 max-h-40 overflow-y-auto" id="reason-editor-list"></div>
            <div class="flex gap-2">
                <input type="text" id="newReasonInput" placeholder="مەبەستی نوێ..." class="flex-1 p-3 bg-slate-50 rounded-xl border-none text-xs">
                <button onclick="addNewReason()" class="px-4 bg-indigo-600 text-white rounded-xl"><i class="fas fa-plus"></i></button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex flex-wrap justify-between items-center gap-4 mb-8 no-print">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 card-grad rounded-2xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-wallet text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800">بەڕێوەبەری دارایی v11.0</h1>
                    <p class="text-[10px] text-slate-400 font-bold">پاشەکەوتکردنی ناوخۆیی (Offline)</p>
                </div>
            </div>

            <div class="flex items-center gap-2 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="px-5 py-2 rounded-xl text-xs font-black transition-all bg-indigo-600 text-white">داشبۆرد</button>
                <button onclick="switchTab('list')" id="nav-list" class="px-5 py-2 rounded-xl text-xs font-black text-slate-400">مێژوو</button>
                <button onclick="switchTab('customers')" id="nav-customers" class="px-5 py-2 rounded-xl text-xs font-black text-slate-400">کڕیارەکان</button>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-400"><i class="fas fa-moon"></i></button>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="view-dashboard" class="space-y-6 no-print">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div class="card-grad p-8 rounded-[2.5rem] text-white shadow-xl">
                    <p class="text-[10px] font-bold opacity-80 uppercase">کاش لەبەردەست</p>
                    <h2 id="sum-safe" class="text-4xl font-black">0 $</h2>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">کۆی قەرزەکان</p>
                    <h2 id="sum-debt" class="text-3xl font-black text-amber-500">0 $</h2>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">خەرجی گشتی</p>
                    <h2 id="sum-total-out" class="text-3xl font-black text-rose-500">0 $</h2>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-sm font-black">تۆمارکردنی خێرا</h3>
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button onclick="setTxType('in')" id="type-in" class="px-6 py-2 rounded-lg text-xs font-black bg-white text-indigo-600 shadow-sm">داهات</button>
                        <button onclick="setTxType('out')" id="type-out" class="px-6 py-2 rounded-lg text-xs font-black text-slate-400">خەرجی</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="txName" placeholder="ناوی کڕیار / مەبەست" class="p-4 bg-slate-50 rounded-xl border-none text-sm font-bold">
                    <div class="flex gap-2">
                        <input type="number" id="txTotal" placeholder="کۆی گشتی" class="w-1/2 p-4 bg-slate-50 rounded-xl border-none text-sm font-bold">
                        <input type="number" id="txCash" placeholder="دراو (کاش)" class="w-1/2 p-4 bg-slate-50 rounded-xl border-none text-sm font-bold">
                    </div>
                    <div class="flex gap-2">
                        <select id="txReason" class="flex-1 p-4 bg-slate-50 rounded-xl border-none text-sm font-bold"></select>
                        <button onclick="openReasonModal()" class="w-14 bg-slate-100 rounded-xl"><i class="fas fa-cog"></i></button>
                    </div>
                    <button onclick="handleFormSubmit()" class="py-4 card-grad text-white rounded-xl font-black shadow-lg">تۆمارکردن</button>
                </div>
            </div>
        </div>

        <!-- History -->
        <div id="view-list" class="hidden space-y-4 no-print">
            <div class="bg-white p-4 rounded-2xl flex flex-wrap gap-2 justify-between items-center">
                <input type="text" oninput="handleSearch(this.value)" placeholder="بگەڕێ..." class="p-2 bg-slate-50 rounded-lg text-xs flex-1">
                <button onclick="exportToExcel()" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-xs font-black">Excel <i class="fas fa-file-excel mr-1"></i></button>
            </div>
            <div id="history-list" class="space-y-2"></div>
        </div>

        <!-- Customers -->
        <div id="view-customers" class="hidden no-print grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <script>
        // State Management
        let appState = {
            transactions: JSON.parse(localStorage.getItem('acc_txs')) || [],
            reasons: JSON.parse(localStorage.getItem('acc_reasons')) || ["فرۆشتنی کاڵا", "کڕینی کاڵا", "خەرجی گشتی"],
            currentTab: 'dashboard',
            currentType: 'in',
            searchTerm: ''
        };

        function saveData() {
            localStorage.setItem('acc_txs', JSON.stringify(appState.transactions));
            localStorage.setItem('acc_reasons', JSON.stringify(appState.reasons));
            updateUI();
        }

        function switchTab(tab) {
            appState.currentTab = tab;
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            
            document.querySelectorAll('[id^="nav-"]').forEach(n => {
                n.className = "px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-400";
            });
            document.getElementById('nav-' + tab).className = "px-5 py-2 rounded-xl text-xs font-black transition-all bg-indigo-600 text-white shadow-md";
            updateUI();
        }

        function setTxType(type) {
            appState.currentType = type;
            document.getElementById('type-in').className = type === 'in' ? "px-6 py-2 rounded-lg text-xs font-black bg-white text-indigo-600 shadow-sm" : "px-6 py-2 rounded-lg text-xs font-black text-slate-400";
            document.getElementById('type-out').className = type === 'out' ? "px-6 py-2 rounded-lg text-xs font-black bg-white text-rose-600 shadow-sm" : "px-6 py-2 rounded-lg text-xs font-black text-slate-400";
        }

        function handleFormSubmit() {
            const name = document.getElementById('txName').value.trim();
            const total = parseFloat(document.getElementById('txTotal').value) || 0;
            const cash = parseFloat(document.getElementById('txCash').value) || 0;
            const reason = document.getElementById('txReason').value;

            if(!name || total <= 0) return alert('تکایە ناو و بڕی پارەکە بە دروستی بنووسە');

            const tx = {
                id: Date.now().toString(),
                name, total, cash, 
                debt: Math.max(0, total - cash),
                reason, type: appState.currentType,
                date: new Date().toISOString()
            };

            appState.transactions.push(tx);
            saveData();
            
            ['txName', 'txTotal', 'txCash'].forEach(id => document.getElementById(id).value = '');
        }

        function deleteTx(id) {
            if(!confirm('ئایا دڵنیایت؟')) return;
            appState.transactions = appState.transactions.filter(t => t.id !== id);
            saveData();
        }

        function updateUI() {
            // Summary
            let safe = 0, debt = 0, totalOut = 0;
            appState.transactions.forEach(t => {
                if(t.type === 'in') { safe += t.cash; debt += t.debt; }
                else { safe -= t.cash; totalOut += t.cash; }
            });

            document.getElementById('sum-safe').innerText = safe.toLocaleString() + ' $';
            document.getElementById('sum-debt').innerText = debt.toLocaleString() + ' $';
            document.getElementById('sum-total-out').innerText = totalOut.toLocaleString() + ' $';

            // Select Options
            document.getElementById('txReason').innerHTML = appState.reasons.map(r => `<option value="${r}">${r}</option>`).join('');

            // History
            const filtered = appState.transactions.filter(t => t.name.toLowerCase().includes(appState.searchTerm.toLowerCase()));
            document.getElementById('history-list').innerHTML = filtered.slice().reverse().map(t => `
                <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-black text-sm">${t.name} <span class="text-[10px] text-slate-400 font-normal">(${t.type === 'in' ? 'داهات' : 'خەرجی'})</span></p>
                        <p class="text-[10px] text-slate-400">${t.reason} • ${new Date(t.date).toLocaleDateString('ku-IQ')}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="font-black ${t.type === 'in' ? 'text-emerald-600' : 'text-rose-600'}">${t.cash.toLocaleString()} $</p>
                            ${t.debt > 0 ? `<p class="text-[9px] text-amber-500 font-bold">قەرز: ${t.debt}$</p>` : ''}
                        </div>
                        <button onclick="showReceipt('${t.id}')" class="text-slate-300 hover:text-indigo-600"><i class="fas fa-file-invoice"></i></button>
                        <button onclick="deleteTx('${t.id}')" class="text-slate-300 hover:text-rose-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            // Customers
            const custs = {};
            appState.transactions.forEach(t => {
                if(!custs[t.name]) custs[t.name] = { debt: 0 };
                if(t.type === 'in') custs[t.name].debt += t.debt;
            });

            document.getElementById('view-customers').innerHTML = Object.entries(custs).map(([name, d]) => `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                    <p class="font-black mb-2">${name}</p>
                    <p class="text-xs text-slate-400 mb-4">کۆی قەرز: <span class="text-amber-600 font-bold">${d.debt.toLocaleString()} $</span></p>
                    <button onclick="payDebt('${name}')" class="w-full py-2 bg-slate-900 text-white rounded-lg text-[10px] font-black">وەسڵکردنی قەرز</button>
                </div>
            `).join('');
        }

        function payDebt(name) {
            const amount = parseFloat(prompt(`بڕی وەسڵکردن بۆ ${name}:`));
            if(!amount || amount <= 0) return;
            
            const tx = {
                id: Date.now().toString(),
                name, total: amount, cash: amount, debt: 0,
                reason: "وەسڵکردنی قەرز", type: 'in',
                date: new Date().toISOString()
            };
            
            // دۆزینەوەی قەرزە کۆنەکان و کەمکردنەوەیان
            let remaining = amount;
            appState.transactions.forEach(t => {
                if(t.name === name && t.type === 'in' && t.debt > 0 && remaining > 0) {
                    const pay = Math.min(t.debt, remaining);
                    t.debt -= pay;
                    remaining -= pay;
                }
            });

            appState.transactions.push(tx);
            saveData();
        }

        function handleSearch(val) { appState.searchTerm = val; updateUI(); }

        function showReceipt(id) {
            const t = appState.transactions.find(x => x.id === id);
            if(!t) return;
            document.getElementById('r-name').innerText = t.name;
            document.getElementById('r-reason').innerText = t.reason;
            document.getElementById('r-total').innerText = t.total.toLocaleString() + ' $';
            document.getElementById('r-cash').innerText = t.cash.toLocaleString() + ' $';
            document.getElementById('r-debt').innerText = t.debt.toLocaleString() + ' $';
            document.getElementById('r-date').innerText = new Date(t.date).toLocaleString('ku-IQ');
            document.getElementById('receiptModal').style.display = 'flex';
        }

        function closeReceipt() { document.getElementById('receiptModal').style.display = 'none'; }
        
        function openReasonModal() {
            document.getElementById('reasonModal').style.display = 'flex';
            renderReasonList();
        }

        function closeReasonModal() { document.getElementById('reasonModal').style.display = 'none'; }

        function renderReasonList() {
            document.getElementById('reason-editor-list').innerHTML = appState.reasons.map((r, i) => `
                <div class="flex justify-between bg-slate-50 p-2 rounded-lg text-xs font-bold">
                    ${r} <button onclick="deleteReason(${i})" class="text-rose-500"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
        }

        function addNewReason() {
            const val = document.getElementById('newReasonInput').value.trim();
            if(val) { appState.reasons.push(val); document.getElementById('newReasonInput').value = ''; saveData(); renderReasonList(); }
        }

        function deleteReason(i) { appState.reasons.splice(i, 1); saveData(); renderReasonList(); }

        function toggleDarkMode() { document.body.classList.toggle('dark'); }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(appState.transactions);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Report.xlsx");
        }

        // Initial Load
        updateUI();
    </script>
</body>
</html>
