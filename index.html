<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی ژمێریاری v11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; transition: all 0.3s; }
        .dark { background-color: #0f172a; color: #f8fafc; }
        .dark .bg-white { background-color: #1e293b; border-color: #334155; color: #f8fafc; }
        .dark .bg-slate-50 { background-color: #0f172a; }
        .dark input, .dark select { background-color: #1e293b; color: white; border: 1px solid #334155 !important; }
        .card-grad { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .animate-pop { animation: pop 0.25s ease-out; }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @media print { .no-print { display: none !important; } body { background: white; padding: 0; } .modal { position: static; display: flex; background: none; } }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8" id="main-body">

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal no-print" onclick="closeReceipt()">
        <div class="bg-white w-[350px] rounded-[2rem] p-8 shadow-2xl animate-pop" onclick="event.stopPropagation()">
            <div class="text-center border-b border-dashed pb-6 mb-6">
                <h2 class="font-black text-xl">وەسڵی فەرمی</h2>
                <p id="r-date" class="text-[10px] text-slate-400 font-bold mt-1"></p>
            </div>
            <div class="space-y-4 mb-8">
                <div class="flex justify-between text-sm"><span class="text-slate-400">کڕیار:</span> <span id="r-name" class="font-black"></span></div>
                <div class="flex justify-between text-sm"><span class="text-slate-400">مەبەست:</span> <span id="r-reason" class="font-bold"></span></div>
                <div class="flex justify-between text-sm"><span class="text-slate-400">کۆی گشتی:</span> <span id="r-total" class="font-black"></span></div>
                <div class="flex justify-between text-sm"><span class="text-emerald-500 font-bold">دراو:</span> <span id="r-cash" class="font-black text-emerald-600"></span></div>
                <div class="flex justify-between text-sm"><span class="text-rose-500 font-bold">قەرز:</span> <span id="r-debt" class="font-black text-rose-600"></span></div>
            </div>
            <div class="no-print space-y-2">
                <button onclick="window.print()" class="w-full py-3 bg-slate-900 text-white rounded-xl text-xs font-black">پرێنت کردن <i class="fas fa-print mr-2"></i></button>
                <button onclick="closeReceipt()" class="w-full py-3 bg-slate-100 text-slate-500 rounded-xl text-xs font-black">داخستن</button>
            </div>
        </div>
    </div>

    <!-- Reason Settings Modal -->
    <div id="reasonModal" class="modal no-print" onclick="closeReasonModal()">
        <div class="bg-white w-[400px] rounded-[2.5rem] p-8 shadow-2xl animate-pop" onclick="event.stopPropagation()">
            <h2 class="font-black text-lg mb-4">بەڕێوەبردنی مەبەستەکان</h2>
            <div class="space-y-2 mb-4 max-h-48 overflow-y-auto" id="reason-editor-list"></div>
            <div class="flex gap-2">
                <input type="text" id="newReasonInput" placeholder="مەبەستی نوێ زیاد بکە..." class="flex-1 p-3 bg-slate-50 rounded-xl border-none text-xs outline-none focus:ring-2 focus:ring-indigo-500">
                <button onclick="addNewReason()" class="px-5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700"><i class="fas fa-plus"></i></button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <!-- Header Section -->
        <div class="flex flex-wrap justify-between items-center gap-4 mb-8 no-print">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 card-grad rounded-2xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-chart-line text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800">سیستەمی ژمێریاری</h1>
                    <p class="text-[10px] text-slate-400 font-bold">پاشەکەوتکردنی ناوخۆیی (LocalStorage)</p>
                </div>
            </div>

            <div class="flex items-center gap-2 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="px-5 py-2 rounded-xl text-xs font-black transition-all bg-indigo-600 text-white">سەرەکی</button>
                <button onclick="switchTab('list')" id="nav-list" class="px-5 py-2 rounded-xl text-xs font-black text-slate-400">مێژوو</button>
                <button onclick="switchTab('customers')" id="nav-customers" class="px-5 py-2 rounded-xl text-xs font-black text-slate-400">کڕیارەکان</button>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-400 hover:bg-slate-50"><i class="fas fa-adjust"></i></button>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="view-dashboard" class="space-y-6 no-print">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div class="card-grad p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                    <i class="fas fa-wallet absolute -right-4 -bottom-4 text-white opacity-10 text-8xl"></i>
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">کاش لەبەردەست</p>
                    <h2 id="sum-safe" class="text-4xl font-black mt-2">0 $</h2>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">کۆی قەرزەکان</p>
                    <h2 id="sum-debt" class="text-3xl font-black text-amber-500 mt-2">0 $</h2>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">کۆی خەرجییەکان</p>
                    <h2 id="sum-total-out" class="text-3xl font-black text-rose-500 mt-2">0 $</h2>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-sm font-black text-slate-700">تۆمارکردنی مامەڵەی نوێ</h3>
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button onclick="setTxType('in')" id="type-in" class="px-6 py-2 rounded-lg text-xs font-black bg-white text-indigo-600 shadow-sm">داهات</button>
                        <button onclick="setTxType('out')" id="type-out" class="px-6 py-2 rounded-lg text-xs font-black text-slate-400">خەرجی</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 mr-2">ناوی کڕیار / فرۆشیار</label>
                        <input type="text" id="txName" placeholder="..." class="w-full p-4 bg-slate-50 rounded-xl border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1 space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 mr-2">کۆی بڕ</label>
                            <input type="number" id="txTotal" placeholder="0.00" class="w-full p-4 bg-slate-50 rounded-xl border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div class="flex-1 space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 mr-2">دراو (کاش)</label>
                            <input type="number" id="txCash" placeholder="0.00" class="w-full p-4 bg-slate-50 rounded-xl border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 mr-2">مەبەست</label>
                        <div class="flex gap-2">
                            <select id="txReason" class="flex-1 p-4 bg-slate-50 rounded-xl border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer"></select>
                            <button onclick="openReasonModal()" class="w-14 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors"><i class="fas fa-cog text-slate-500"></i></button>
                        </div>
                    </div>
                    <div class="pt-5">
                        <button onclick="handleFormSubmit()" class="w-full py-4 card-grad text-white rounded-xl font-black shadow-lg hover:opacity-90 transition-all active:scale-95">تۆمارکردنی مامەڵە</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- History View -->
        <div id="view-list" class="hidden space-y-4 no-print">
            <div class="bg-white p-4 rounded-2xl flex flex-wrap gap-3 justify-between items-center shadow-sm">
                <div class="relative flex-1 min-w-[200px]">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" oninput="handleSearch(this.value)" placeholder="بگەڕێ بۆ ناو یان مەبەست..." class="w-full pl-10 pr-4 py-2 bg-slate-50 rounded-lg text-xs outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-lg text-xs font-black transition-colors">داگرتنی ڕاپۆرت (Excel) <i class="fas fa-file-excel mr-1"></i></button>
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <!-- Customers View -->
        <div id="view-customers" class="hidden no-print grid grid-cols-1 md:grid-cols-3 gap-5"></div>
    </div>

    <script>
        // --- State Management ---
        let appState = {
            transactions: JSON.parse(localStorage.getItem('acc_txs')) || [],
            reasons: JSON.parse(localStorage.getItem('acc_reasons')) || ["فرۆشتنی کاڵا", "کڕینی کاڵا", "خەرجی گشتی", "کڕینی کەلوپەل"],
            currentTab: 'dashboard',
            currentType: 'in',
            searchTerm: ''
        };

        function saveData() {
            localStorage.setItem('acc_txs', JSON.stringify(appState.transactions));
            localStorage.setItem('acc_reasons', JSON.stringify(appState.reasons));
            updateUI();
        }

        // --- Navigation ---
        function switchTab(tab) {
            appState.currentTab = tab;
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            
            document.querySelectorAll('[id^="nav-"]').forEach(n => {
                n.className = "px-5 py-2 rounded-xl text-xs font-black transition-all text-slate-400 hover:bg-white hover:shadow-sm";
            });
            document.getElementById('nav-' + tab).className = "px-5 py-2 rounded-xl text-xs font-black transition-all bg-indigo-600 text-white shadow-md";
            updateUI();
        }

        function setTxType(type) {
            appState.currentType = type;
            const inBtn = document.getElementById('type-in');
            const outBtn = document.getElementById('type-out');
            
            if(type === 'in') {
                inBtn.className = "px-6 py-2 rounded-lg text-xs font-black bg-white text-indigo-600 shadow-sm";
                outBtn.className = "px-6 py-2 rounded-lg text-xs font-black text-slate-400";
            } else {
                outBtn.className = "px-6 py-2 rounded-lg text-xs font-black bg-white text-rose-600 shadow-sm";
                inBtn.className = "px-6 py-2 rounded-lg text-xs font-black text-slate-400";
            }
        }

        // --- Core Functions ---
        function handleFormSubmit() {
            const name = document.getElementById('txName').value.trim();
            const total = parseFloat(document.getElementById('txTotal').value) || 0;
            const cash = parseFloat(document.getElementById('txCash').value) || 0;
            const reason = document.getElementById('txReason').value;

            if(!name || total <= 0) return alert('تکایە دڵنیابەرەوە لە نووسینی ناو و بڕی پارەکە');

            const tx = {
                id: "TX-" + Date.now(),
                name, total, cash, 
                debt: Math.max(0, total - cash),
                reason, 
                type: appState.currentType,
                date: new Date().toISOString()
            };

            appState.transactions.push(tx);
            saveData();
            
            // Clear inputs
            ['txName', 'txTotal', 'txCash'].forEach(id => document.getElementById(id).value = '');
        }

        function deleteTx(id) {
            if(!confirm('ئایا دڵنیایت لە سڕینەوەی ئەم مامەڵەیە؟')) return;
            appState.transactions = appState.transactions.filter(t => t.id !== id);
            saveData();
        }

        function payDebt(customerName) {
            const amount = parseFloat(prompt(`بڕی پارەی وەرگیراو لە [${customerName}] بنووسە:`));
            if(!amount || isNaN(amount) || amount <= 0) return;

            // ١. تۆمارکردنی وەک داهات
            const paymentTx = {
                id: "PAY-" + Date.now(),
                name: customerName,
                total: amount,
                cash: amount,
                debt: 0,
                reason: "وەسڵکردنی قەرز",
                type: 'in',
                date: new Date().toISOString()
            };

            // ٢. کەمکردنەوەی قەرز لە مامەڵە کۆنەکان
            let remainingPay = amount;
            for(let i = 0; i < appState.transactions.length; i++) {
                let t = appState.transactions[i];
                if(t.name === customerName && t.type === 'in' && t.debt > 0) {
                    const deduction = Math.min(t.debt, remainingPay);
                    t.debt -= deduction;
                    remainingPay -= deduction;
                    if(remainingPay <= 0) break;
                }
            }

            appState.transactions.push(paymentTx);
            saveData();
        }

        // --- UI Updates ---
        function updateUI() {
            // Update Stats
            let safe = 0, totalDebt = 0, totalExpenses = 0;
            appState.transactions.forEach(t => {
                if(t.type === 'in') {
                    safe += t.cash;
                    totalDebt += t.debt;
                } else {
                    safe -= t.cash;
                    totalExpenses += t.cash;
                }
            });

            document.getElementById('sum-safe').innerText = safe.toLocaleString() + ' $';
            document.getElementById('sum-debt').innerText = totalDebt.toLocaleString() + ' $';
            document.getElementById('sum-total-out').innerText = totalExpenses.toLocaleString() + ' $';

            // Update Reason Select
            document.getElementById('txReason').innerHTML = appState.reasons.map(r => `<option value="${r}">${r}</option>`).join('');

            // Render History
            if(appState.currentTab === 'list') renderHistory();
            
            // Render Customers
            if(appState.currentTab === 'customers') renderCustomers();
        }

        function renderHistory() {
            const filtered = appState.transactions.filter(t => 
                t.name.toLowerCase().includes(appState.searchTerm.toLowerCase()) || 
                t.reason.toLowerCase().includes(appState.searchTerm.toLowerCase())
            );

            document.getElementById('history-list').innerHTML = filtered.slice().reverse().map(t => `
                <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50 hover:border-indigo-100 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center ${t.type === 'in' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">
                            <i class="fas ${t.type === 'in' ? 'fa-arrow-down' : 'fa-arrow-up'} text-xs"></i>
                        </div>
                        <div>
                            <p class="font-black text-sm text-slate-800">${t.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${t.reason} • ${new Date(t.date).toLocaleDateString('ku-IQ')}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-right">
                            <p class="font-black ${t.type === 'in' ? 'text-emerald-600' : 'text-rose-600'} text-lg">${t.cash.toLocaleString()} $</p>
                            ${t.debt > 0 ? `<p class="text-[10px] text-amber-500 font-black">قەرز: ${t.debt.toLocaleString()} $</p>` : ''}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="showReceipt('${t.id}')" class="w-8 h-8 rounded-lg bg-slate-50 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all"><i class="fas fa-file-invoice-dollar text-xs"></i></button>
                            <button onclick="deleteTx('${t.id}')" class="w-8 h-8 rounded-lg bg-slate-50 text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-all"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                    </div>
                </div>
            `).join('') || `<div class="text-center py-20 text-slate-400 font-bold">هیچ مامەڵەیەک نەدۆزرایەوە</div>`;
        }

        function renderCustomers() {
            const custMap = {};
            appState.transactions.forEach(t => {
                if(!custMap[t.name]) custMap[t.name] = { totalDebt: 0, lastActivity: t.date };
                if(t.type === 'in') custMap[t.name].totalDebt += t.debt;
                custMap[t.name].lastActivity = t.date;
            });

            const customers = Object.entries(custMap).filter(([name]) => name.toLowerCase().includes(appState.searchTerm.toLowerCase()));

            document.getElementById('view-customers').innerHTML = customers.map(([name, data]) => `
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col items-center text-center">
                    <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-2xl mb-4">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <h3 class="font-black text-slate-800 mb-1">${name}</h3>
                    <p class="text-[10px] text-slate-400 font-bold mb-4">دوایین چالاکی: ${new Date(data.lastActivity).toLocaleDateString('ku-IQ')}</p>
                    <div class="w-full bg-slate-50 p-4 rounded-2xl mb-4">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">کۆی قەرز</p>
                        <p class="text-xl font-black ${data.totalDebt > 0 ? 'text-amber-500' : 'text-emerald-500'}">${data.totalDebt.toLocaleString()} $</p>
                    </div>
                    <button onclick="payDebt('${name}')" class="w-full py-3 bg-slate-900 text-white rounded-xl text-xs font-black hover:bg-indigo-600 transition-colors">وەسڵکردنی قەرز</button>
                </div>
            `).join('') || `<div class="col-span-full text-center py-20 text-slate-400 font-bold">هیچ کڕیارێک نەدۆزرایەوە</div>`;
        }

        // --- Search & Export ---
        function handleSearch(val) {
            appState.searchTerm = val;
            updateUI();
        }

        function exportToExcel() {
            const dataToExport = appState.transactions.map(t => ({
                'کڕیار/فرۆشیار': t.name,
                'جۆری مامەڵە': t.type === 'in' ? 'داهات' : 'خەرجی',
                'کۆی بڕ': t.total,
                'دراو (کاش)': t.cash,
                'قەرز': t.debt,
                'مەبەست': t.reason,
                'بەروار': new Date(t.date).toLocaleDateString('ku-IQ')
            }));
            
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, `Accounting_Report_${new Date().toLocaleDateString()}.xlsx`);
        }

        // --- Modals Management ---
        function showReceipt(id) {
            const t = appState.transactions.find(x => x.id === id);
            if(!t) return;
            document.getElementById('r-name').innerText = t.name;
            document.getElementById('r-reason').innerText = t.reason;
            document.getElementById('r-total').innerText = t.total.toLocaleString() + ' $';
            document.getElementById('r-cash').innerText = t.cash.toLocaleString() + ' $';
            document.getElementById('r-debt').innerText = t.debt.toLocaleString() + ' $';
            document.getElementById('r-date').innerText = new Date(t.date).toLocaleString('ku-IQ');
            document.getElementById('receiptModal').style.display = 'flex';
        }

        function closeReceipt() { document.getElementById('receiptModal').style.display = 'none'; }

        function openReasonModal() {
            document.getElementById('reasonModal').style.display = 'flex';
            renderReasonList();
        }

        function closeReasonModal() { document.getElementById('reasonModal').style.display = 'none'; }

        function renderReasonList() {
            document.getElementById('reason-editor-list').innerHTML = appState.reasons.map((r, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl text-xs font-bold text-slate-700">
                    <span>${r}</span>
                    <button onclick="deleteReason(${i})" class="text-rose-400 hover:text-rose-600 p-1"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function addNewReason() {
            const val = document.getElementById('newReasonInput').value.trim();
            if(val && !appState.reasons.includes(val)) {
                appState.reasons.push(val);
                document.getElementById('newReasonInput').value = '';
                saveData();
                renderReasonList();
            }
        }

        function deleteReason(index) {
            if(confirm('ئایا دڵنیایت لە سڕینەوەی ئەم مەبەستە؟')) {
                appState.reasons.splice(index, 1);
                saveData();
                renderReasonList();
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('acc_dark_mode', isDark);
        }

        // --- Load Initial State ---
        if(localStorage.getItem('acc_dark_mode') === 'true') document.body.classList.add('dark');
        updateUI();

    </script>
</body>
</html>
